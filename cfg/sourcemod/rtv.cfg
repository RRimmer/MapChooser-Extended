// When to change the map after a succesful RTV: 0 - Instant, 1 - RoundEnd, 2 - MapEnd
// Когда менять карту после успешного RTV: 0 - Моментально, 1 - В конце рануда, 2 - В конце карты
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "2.000000"
sm_rtv_changetime "0"

// Chat prefix for all RTV related messages
// Префикс чата для всех сообщений, связанных с RTV
// -
// По умолчанию: "[MCE] "
sm_rtv_chatprefix "{DARKBLUE}[MCE]{DEFAULT} "

// Display the Map's custom name, instead of the raw map name
// Отображение пользовательского имени карты вместо исходного имени карты
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
sm_rtv_displayname "1"

// Time (in seconds) before first RTV can be held
// Время (в секундах) до того, как можно будет провести первый RTV
// -
// По умолчанию: "30.0"
// Минимум: "0.000000"
sm_rtv_initialdelay "30.0"

// Time (in seconds) after a failed RTV before another can be held
// Время (в секундах) после неудачного RTV до того, как можно будет начать другой
// -
// По умолчанию: "240.0"
// Минимум: "0.000000"
sm_rtv_interval "240.0"

// Number of players required before RTV will be enabled.
// Количество игроков, необходимое для включения RTV.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "65.000000"
sm_rtv_minplayers "0"

// Percentage of players needed to rockthevote (Def 60%)
// Процент игроков, необходимых для получения голоса (По умолчанию 60%)
// -
// По умолчанию: "0.60"
// Минимум: "0.050000"
// Максимум: "1.000000"
sm_rtv_needed "0.60"

// What to do with RTV's after a mapvote has completed. 0 - Allow, success = instant change, 1 - Deny
// Что делать с RTV после завершения mapvote. 0 - разрешить, успех = мгновенное изменение, 1 - запретить
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "1.000000"
sm_rtv_postvoteaction "0"