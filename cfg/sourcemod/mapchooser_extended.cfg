// Этот файл был принудительно сгенерирован вами :D (by Rimmer)
// Для плагина "mapchooser_extended.smx"
// Если нужна помощь заходи, помогу!
// https://discord.gg/sR9YAaC


// Добавить Не голосовать в меню голосования?
// Add "No Vote" to vote menu?
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_addnovote "1"

// Блок слота для предотвращения случайного голосования. Применяется только когда голосование уже запущено.
// Block slots to prevent accidental votes.  Only applies when Voice Command style menus are in use.
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_blockslots "1"

// Префикс в чате для всех сообщений, связанных с MCE
// Chat prefix for all MCE related messages
// -
// По умолчанию: "[MCE] "
mce_chatprefix "{DARKBLUE}[MCE]{DEFAULT} "

// Добавлять в голосование значение Не менять?
// Specifies if a 'Don't Change' option should be added to early votes
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_dontchange "1"

// Запуск MapChooser в конце карты?
// Specifies if MapChooser should run an end of map vote
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_endvote "1"

// Какое количество прошлых карт исключать и голосования.
// Specifies how many past maps to exclude from the vote.
// -
// По умолчанию: "5"
// Минимум: "0.000000"
mce_exclude "5"

// Количество продлений карты.
// Number of extensions allowed each map.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
mce_extend "0"

// На сколько фрагов увеличить игру, если выберят продление карты.
// Specifies how many more frags are allowed when map is extended.
// -
// По умолчанию: "10"
// Минимум: "5.000000"
mce_extend_fragstep "10"

// На сколько раундов увеличить игру, если выберят продление карты.
// Specifies how many more rounds each extension makes
// -
// По умолчанию: "5"
// Минимум: "1.000000"
mce_extend_roundstep "5"

// На сколько минут увеличить игру, если выберят продление карты.
// Specifies how much many more minutes each extension makes
// -
// По умолчанию: "15"
// Минимум: "5.000000"
mce_extend_timestep "15"

// Голосование за продление карты в начале карты или в конце. 0, В конце. 1, В Начале.
// Position of Extend/Don't Change options. 0 = at end, 1 = at start.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_extendposition "0"

// Не показывать предупреждение MapChooser Extended.
// Hide the MapChooser Extended warning timer
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_hidetimer "0"

// Сколько карт добавлять в меню голосования.
// Specifies how many maps to include in the vote.
// -
// По умолчанию: "5"
// Минимум: "2.000000"
// Максимум: "6.000000"
mce_include "5"

// Помечать пользовательские карты в списке карт на голосование. 0 = Выключить, 1 = Будет будет помечен "*", 2 = Будет помечен с фразой "Кастом".
// Mark custom maps in the vote list. 0 = Disabled, 1 = Mark with *, 2 = Mark with phrase.
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "2.000000"
mce_markcustommaps "1"

// Сколько раз можно отменить голосование за карту.
// Number of run off votes allowed each map.
// -
// По умолчанию: "1"
// Минимум: "0.000000"
mce_maxrunoffs "1"

// Стиль меню. 0 - Стандартный стиль. 1 - Стиль как у Valve, нужно выходить в главное меню. 2 - Новый вид от 1 до 9.
// Menu Style.  0 is the game's default, 1 is the older Valve style that requires you to press Escape to see the menu, 2 is the newer 1-9 button Voice Command style, unavailable in some games. Ignored on TF2 if NativeVotes Plugin is loaded.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "2.000000"
mce_menustyle "0"

// Если не было получено голосов при голосование, то MapChooser выбирает карту сам.
// Specifies if MapChooser should pick a map (1), extend (2), or do nothing (0) if no votes are received.
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_novote "1"

// Указывает минимальное количество игроков для расширения карты, если не получено голосов (требуется mce_novote 2)
// Specifies the minimum number of players to extend map if no votes are received (requires mce_novote 2)
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "64.000000"
mce_novote_minplayers "0"

// Запускать случайную карту?
// Randomize map order?
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_randomizeorder "0"

// Провести повторное голосование, если победивший вариант наберет одинаковое кол-во голосов.
// Hold run off votes if winning choice has less than a certain percentage of votes
// -
// По умолчанию: "1"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_runoff "1"

// Если в конце голосования, процент меньше указанного, то запускать повторное голосование.
// If winning choice has less than this percent of votes, hold a runoff
// -
// По умолчанию: "50"
// Минимум: "0.000000"
// Максимум: "100.000000"
mce_runoffpercent "50"

// Время повторного голосования.
// Warning time for runoff vote in seconds.
// -
// По умолчанию: "5.0"
// Минимум: "0.000000"
// Максимум: "30.000000"
mce_runoffvotewarningtime "5.0"

// Указывает когда начнется голосование, после получения N процентов голосов.
// Specifies when to start the vote based on percents.
// -
// По умолчанию: "35.0"
// Минимум: "0.000000"
// Максимум: "100.000000"
mce_start_percent "35.0"

// Включение или отключение процент расчетов.
// Enable or Disable percentage calculations when to start vote.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "1.000000"
mce_start_percent_enable "0"

// Указывает, когда начнется голосование на основе оставшихся фрагов.
// Specifies when to start the vote base on frags remaining.
// -
// По умолчанию: "5.0"
// Минимум: "1.000000"
mce_startfrags "5.0"

// Указывает, когда начнется голосование на основе оставшихся раундов.
// Specifies when to start the vote based on rounds remaining. Use 0 on DoD:S, CS:S, and TF2 to start vote during bonus round time
// -
// По умолчанию: "2.0"
// Минимум: "0.000000"
mce_startround "2.0"

// Указывает, когда начнется голосование до конца карты.
// Specifies when to start the vote based on time remaining.
// -
// По умолчанию: "10.0"
// Минимум: "1.000000"
mce_starttime "10.0"

// Как долго будет доступно меню голосования.
// Specifies how long the mapvote should be available for.
// -
// По умолчанию: "20"
// Минимум: "5.000000"
mce_voteduration "20"

// Время предупреждения в секундах.
// Warning time in seconds.
// -
// По умолчанию: "15.0"
// Минимум: "0.000000"
// Максимум: "60.000000"
mce_warningtime "15.0"

// Расположение текста предупреждающего таймера. 0 = Хитбокс, 1 = Центральный текст, 2 = Чат. 
// Location for the warning timer text. 0 = HintBox, 1 = Center text, 2 = Chat.
// -
// По умолчанию: "0"
// Минимум: "0.000000"
// Максимум: "2.000000"
mce_warningtimerlocation "0"


